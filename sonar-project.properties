sonar.projectKey=David-Crty_databasement
sonar.organization=david-crty
sonar.projectName=databasement

# Coverage is only collected for app/ (see phpunit.xml <source>), so scope
# analysis sources there too — otherwise config/, database/, routes/, etc.
# count as uncovered main code and dilute the coverage percentage.
sonar.sources=app
sonar.tests=tests

sonar.php.coverage.reportPaths=coverage.xml
sonar.php.tests.reportPath=junit.xml
